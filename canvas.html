<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无限画布 - 容量AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 50:'#f0f4ff',100:'#dbe4ff',200:'#bac8ff',300:'#91a7ff',400:'#748ffc',500:'#5c7cfa',600:'#4c6ef5',700:'#4263eb',800:'#3b5bdb',900:'#364fc7' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://unpkg.com/reactflow@11.11.4/dist/base.css">
    <link rel="stylesheet" href="https://unpkg.com/reactflow@11.11.4/dist/style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter','Noto Sans SC',sans-serif; }
        body { background:#0f1117; color:#e4e5e7; overflow:hidden; height:100vh; }
        #root { width:100vw; height:100vh; }

        ::-webkit-scrollbar { width:4px; height:4px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.08); border-radius:2px; }

        .react-flow__node { border-radius:10px !important; }
        .react-flow__handle { width:10px !important; height:10px !important; border:2px solid #1a1b1e !important; }
        .react-flow__handle-left { left:-5px !important; }
        .react-flow__handle-right { right:-5px !important; }
        .react-flow__edge-path { stroke-width:2.5 !important; }
        .react-flow__minimap { border-radius:10px !important; overflow:hidden !important; border:1px solid rgba(255,255,255,0.08) !important; background:rgba(20,21,23,0.95) !important; }
        .react-flow__controls { border-radius:8px !important; overflow:hidden !important; border:1px solid rgba(255,255,255,0.08) !important; background:rgba(20,21,23,0.95) !important; }
        .react-flow__controls-button { background:transparent !important; border-bottom:1px solid rgba(255,255,255,0.06) !important; fill:#909296 !important; width:28px !important; height:28px !important; }
        .react-flow__controls-button:hover { background:rgba(255,255,255,0.06) !important; }
        .react-flow__controls-button { position:relative !important; }
        .react-flow__controls-button::after {
            content:attr(data-tooltip); position:absolute; left:110%; top:50%; transform:translateY(-50%);
            background:rgba(0,0,0,0.85); color:#e0e0e0; font-size:10px; padding:3px 8px; border-radius:4px;
            white-space:nowrap; pointer-events:none; opacity:0; transition:opacity 0.15s;
            font-family:'Inter',sans-serif; line-height:1.4;
        }
        .react-flow__controls-button:hover::after { opacity:1; }
        .react-flow__attribution { display:none !important; }

        @keyframes spin { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
        @keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(-10px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
        @keyframes menuIn { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

        .toast {
            position:fixed; top:16px; left:50%; transform:translateX(-50%); z-index:2000;
            padding:8px 18px; border-radius:8px; font-size:12px; font-weight:500;
            animation:toastIn 0.25s ease-out; pointer-events:none;
        }
        .toast-success { background:#087f5b; color:#fff; }
        .toast-error { background:#c92a2a; color:#fff; }
        .toast-warning { background:#e67700; color:#fff; }
        .toast-info { background:#364fc7; color:#fff; }

        .ctx-menu {
            position:fixed; z-index:1000; background:#1a1b1e; border:1px solid rgba(255,255,255,0.1);
            border-radius:10px; padding:4px; min-width:180px; box-shadow:0 16px 48px rgba(0,0,0,0.5);
            animation:menuIn 0.12s ease-out;
        }
        .ctx-item {
            padding:7px 10px; border-radius:6px; cursor:pointer; font-size:12px; color:#c1c2c5;
            display:flex; align-items:center; gap:7px; transition:all 0.1s;
        }
        .ctx-item:hover { background:rgba(255,255,255,0.06); color:#fff; }
        .ctx-divider { height:1px; background:rgba(255,255,255,0.06); margin:3px 6px; }

        /* Node internal select/button styles */
        .node-select {
            background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08);
            border-radius:5px; color:#c1c2c5; font-size:11px; padding:4px 6px;
            outline:none; cursor:pointer; width:100%;
        }
        .node-select:focus { border-color:rgba(76,110,245,0.5); }
        .node-btn {
            border-radius:5px; border:1px solid rgba(255,255,255,0.1);
            background:rgba(255,255,255,0.03); color:#c1c2c5;
            font-size:10px; padding:4px 8px; cursor:pointer; transition:all 0.15s;
            display:flex; align-items:center; gap:3px; justify-content:center;
        }
        .node-btn:hover { background:rgba(255,255,255,0.08); border-color:rgba(255,255,255,0.2); color:#fff; }
        .node-btn-primary {
            border-radius:5px; border:none; background:linear-gradient(135deg,#4c6ef5,#7950f2);
            color:#fff; font-size:11px; padding:5px 10px; cursor:pointer; font-weight:500;
            transition:all 0.15s; display:flex; align-items:center; gap:4px; justify-content:center;
        }
        .node-btn-primary:hover { box-shadow:0 4px 12px rgba(76,110,245,0.35); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/reactflow@11.11.4/dist/umd/index.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const RF = window.ReactFlow;
        if (!RF) {
            document.getElementById('root').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#ff6b6b;font-size:16px;">ReactFlow 加载失败，请检查网络后刷新</div>';
            throw new Error('ReactFlow not loaded');
        }

        const { useState, useRef, useCallback, useEffect } = React;
        const {
            ReactFlow, ReactFlowProvider, useReactFlow, useNodesState, useEdgesState,
            addEdge, Controls, Background, MiniMap, MarkerType,
            Handle, Position
        } = RF;

        // ==================== 8 NODE TYPES ====================
        const NODE_TYPES_CONFIG = {
            text_node:   { label:'文本节点', icon:'📜', color:'#748ffc', bg:'rgba(116,143,252,0.10)', input:[], output:['script'] },
            character_gen:  { label:'角色生成', icon:'👤', color:'#4dabf7', bg:'rgba(77,171,247,0.10)',  input:['script'], output:['character'] },
            scene_gen:      { label:'场景生成', icon:'🏞️', color:'#ffd43b', bg:'rgba(255,212,59,0.10)', input:['script'], output:['scene'] },
            prop_gen:       { label:'道具生成', icon:'💎', color:'#da77f2', bg:'rgba(218,119,242,0.10)', input:['script','scene'], output:['prop'] },
            storyboard_gen: { label:'分镜视频', icon:'🎞️', color:'#ff8787', bg:'rgba(255,135,135,0.10)', input:['script','character','scene','prop'], output:['storyboard'] },
            video_gen:      { label:'视频生成', icon:'🎥', color:'#f06595', bg:'rgba(240,101,149,0.10)', input:['storyboard','image'], output:['video'] },
            video_compose:  { label:'视频合成', icon:'✂️', color:'#e0e0e0', bg:'rgba(224,224,224,0.10)', input:['storyboard','video'], output:['video'] },
            image_gen:      { label:'图片生成', icon:'🖼️', color:'#20c997', bg:'rgba(32,201,151,0.10)',  input:['script','storyboard'], output:['image'] },
        };

        const EDGE_COLORS = {
            script:'#748ffc', character:'#4dabf7', scene:'#ffd43b', prop:'#da77f2',
            storyboard:'#ff8787', video:'#f06595', image:'#20c997', default:'#5c5f66'
        };

        function typeOk(srcOut, tgtInputs) {
            if (!tgtInputs || tgtInputs.length===0) return true;
            return tgtInputs.includes(srcOut);
        }

        // Model options per node type
        const MODEL_OPTIONS = {
            text_node: ['豆包大模型','DeepSeek Chat','GPT-4o'],
            character_gen: ['Seedream 5.0','Seedream 4.5','LibNano Pro'],
            scene_gen: ['Seedream 5.0','Seedream 4.5','Qwen Image'],
            prop_gen: ['Seedream 5.0','LibNano Pro','Qwen Image'],
            storyboard_gen: ['Seedream 5.0','Seedream 4.5','LibNano Pro'],
            video_gen: ['Seedance 2.0','Kling 3.0','Kling O3','Wan 2.6'],
            image_gen: ['Seedream 5.0','Seedream 4.5','LibNano Pro','Qwen Image'],
        };

        const STYLE_OPTIONS = ['2D手绘','3D卡通','仿真真人','赛博朋克','水墨古风','日系动漫','美式漫画'];

        // ==================== NODE COMPONENT (clean card + expandable panel) ====================
        function CustomNode({ id, data, selected }) {
            const cfg = NODE_TYPES_CONFIG[data.nodeType] || NODE_TYPES_CONFIG.text_node;
            const hasIn = cfg.input.length > 0;
            const hasOut = cfg.output.length > 0;
            const st = data.status || 'ready';
            const [expanded, setExpanded] = useState(false);

            const statusColor = {
                ready:'rgba(255,255,255,0.10)', queued:'#4c6ef5', running:'#f59f00',
                completed:'#20c997', failed:'#ff6b6b'
            }[st] || 'rgba(255,255,255,0.10)';

            const statusGlow = st==='running' ? '0 0 20px rgba(245,159,0,0.4)' :
                               st==='completed' ? '0 0 10px rgba(32,201,151,0.25)' :
                               st==='failed' ? '0 0 14px rgba(255,107,107,0.3)' : 'none';
            const shadow = selected ? '0 0 0 2px '+cfg.color+', '+statusGlow : statusGlow;

            // Panel state
            const [sourceType, setSourceType] = useState(data.sourceType||'upload');
            const [model, setModel] = useState(data.model||MODEL_OPTIONS[data.nodeType]?.[0]||'');
            const [ratio, setRatio] = useState(data.ratio||'9:16');
            const [duration, setDuration] = useState(data.duration||'5');
            const [resolution, setResolution] = useState(data.resolution||'1080P');
            const [style, setStyle] = useState(data.style||STYLE_OPTIONS[0]);
            const [cost, setCost] = useState(data.cost||0);
            const [file, setFile] = useState(data.fileName||null);
            const [desc, setDesc] = useState(data.description||'');

            const isScript = data.nodeType === 'text_node';

            const computeCost = useCallback((m,r,d,res) => {
                let base = 5;
                if (['Seedance 2.0','Kling 3.0'].includes(m)) base = 15;
                else if (['Seedream 5.0','LibNano Pro'].includes(m)) base = 8;
                if (res==='2K') base += 5;
                if (res==='4K') base += 12;
                return base + Math.ceil((parseInt(d)||5)/5)*3;
            }, []);

            const showDuration = ['video_gen'].includes(data.nodeType);
            const showResolution = ['video_gen','image_gen'].includes(data.nodeType);
            const showStyle = ['character_gen','scene_gen','prop_gen','storyboard_gen','image_gen','video_gen'].includes(data.nodeType);
            const showRatio = ['image_gen','video_gen'].includes(data.nodeType);
            const hasPreview = data.preview || st==='completed';
            // isScript already declared above

            // Click to toggle expanded panel
            const onCardClick = useCallback((e) => {
                e.stopPropagation();
                setExpanded(prev => !prev);
            }, []);

            // Demo thumbnails for "基础设定" section
            const demoThumbs = [
                'data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60"><rect width="60" height="60" rx="8" fill="#2a2a2a"/><text x="30" y="35" text-anchor="middle" fill="#666" font-size="20">🖼️</text></svg>'),
                'data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60"><rect width="60" height="60" rx="8" fill="#2a2a2a"/><text x="30" y="35" text-anchor="middle" fill="#666" font-size="20">🎬</text></svg>'),
                'data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60"><rect width="60" height="60" rx="8" fill="#2a2a2a"/><text x="30" y="35" text-anchor="middle" fill="#666" font-size="20">🎨</text></svg>'),
            ];

            return React.createElement('div', { style:{ position:'relative', zIndex:expanded?50:1 } },
                // === NODE CARD (compact) ===
                React.createElement('div', {
                    style:{
                        background:'#1a1b1e', border:'1.5px solid '+statusColor,
                        borderRadius:'12px', width:'260px',
                        boxShadow:shadow, transition:'box-shadow 0.2s, border-color 0.2s',
                        cursor:'pointer', fontSize:'12px', overflow:'hidden',
                    },
                    onClick:onCardClick,
                },
                    // Input handle
                    hasIn ? React.createElement(Handle, {
                        type:'target', position:Position.Left,
                        style:{background:cfg.color,border:'2px solid #1a1b1e',width:'10px',height:'10px'},
                        id:'in', key:'in'
                    }) : null,

                    // Preview area (top)
                    hasPreview ? React.createElement('div', {
                        style:{
                            width:'100%', height:'100px',
                            background: data.preview ? 'url('+data.preview+') center/cover' : cfg.bg,
                            display:'flex', alignItems:'center', justifyContent:'center',
                            position:'relative',
                        }, key:'preview'
                    },
                        !data.preview ? React.createElement('span',{style:{fontSize:'32px',opacity:0.4}},cfg.icon) : null,
                        st==='running' ? React.createElement('div',{
                            style:{position:'absolute',inset:0,background:'rgba(0,0,0,0.4)',display:'flex',alignItems:'center',justifyContent:'center'}
                        }, React.createElement('div',{
                            style:{width:'32px',height:'32px',border:'3px solid rgba(255,255,255,0.3)',borderTopColor:'#fff',borderRadius:'50%',animation:'spin 0.8s linear infinite'}
                        })) : null,
                        st==='completed' && data.nodeType==='video_gen' ? React.createElement('div',{
                            style:{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}
                        }, React.createElement('div',{
                            style:{width:'36px',height:'36px',borderRadius:'50%',background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(4px)'}
                        }, React.createElement('svg',{width:'14',height:'14',viewBox:'0 0 24 24',fill:'white'},React.createElement('polygon',{points:'5 3 19 12 5 21 5 3'})))) : null,
                    ) : null,

                    // Header
                    React.createElement('div', {
                        style:{
                            display:'flex',alignItems:'center',gap:'8px',
                            padding:'10px 14px', background:cfg.bg,
                            borderTop:hasPreview?'1px solid rgba(255,255,255,0.04)':'none',
                            borderRadius:hasPreview?'0':'12px 12px 0 0',
                        }, key:'hdr'
                    },
                        React.createElement('span',{style:{fontSize:'18px'}},cfg.icon),
                        React.createElement('span',{style:{fontSize:'13px',fontWeight:700,color:cfg.color,flex:1}},data.label||cfg.label),
                        st==='running' ? React.createElement('span',{
                            style:{width:'12px',height:'12px',border:'2px solid #f59f00',borderTopColor:'transparent',borderRadius:'50%',animation:'spin 0.8s linear infinite'}
                        }) : null,
                        st==='completed' ? React.createElement('span',{style:{color:'#20c997',fontSize:'14px'}},'\u2713') : null,
                        st==='failed' ? React.createElement('span',{style:{color:'#ff6b6b',fontSize:'14px'}},'\u2715') : null,
                        // Expand indicator
                        React.createElement('span',{style:{color:'#5c5f66',fontSize:'10px',transition:'transform 0.2s',transform:expanded?'rotate(180deg)':'rotate(0deg)'}},'▼'),
                    ),

                    // Output handle
                    hasOut ? React.createElement(Handle, {
                        type:'source', position:Position.Right,
                        style:{background:cfg.color,border:'2px solid #1a1b1e',width:'10px',height:'10px'},
                        id:'out', key:'out'
                    }) : null
                ),

                // === EXPANDED PANEL ===
                expanded ? React.createElement('div', {
                    style: {
                        position:'absolute', top:'calc(100% + 8px)', left:'0',
                        width: isScript ? '480px' : '420px', background:'#1a1b1e',
                        borderRadius:'12px', border:'1px solid rgba(255,255,255,0.08)',
                        boxShadow:'0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04)',
                        padding:'16px', zIndex:100,
                        animation:'menuIn 0.2s ease-out',
                    },
                    onClick:e=>e.stopPropagation(),
                },
                    // Header bar
                    React.createElement('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'12px'}},
                        React.createElement('span',{style:{fontSize:'12px',fontWeight:600,color:'#e4e5e7'}},cfg.label),
                    ),
                    // Content area
                    React.createElement('div',{},
                    isScript ? React.createElement('div',null,
                        // Top action buttons (like screenshot)
                        React.createElement('div',{style:{display:'flex',gap:'6px',marginBottom:'14px'}},
                            React.createElement('button',{style:{flex:1,padding:'8px 10px',borderRadius:'8px',border:'1px solid rgba(76,110,245,0.3)',background:'rgba(76,110,245,0.12)',color:'#bac8ff',fontSize:'11px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:'4px',transition:'all 0.15s'},
                                onMouseEnter:e=>{e.target.style.background='rgba(76,110,245,0.2)';},
                                onMouseLeave:e=>{e.target.style.background='rgba(76,110,245,0.12)';},
                            },'⬆️ 上传剧本'),
                        ),
                        // Script content area with word count
                        React.createElement('div',{style:{position:'relative',marginBottom:'14px'}},
                            React.createElement('textarea',{
                                value:desc,
                                onChange:e=>setDesc(e.target.value),
                                placeholder:'输入剧本内容...\n\n示例：\n高考恶意被毁，0分的我却是清北争抢对象\n\n离高考开场还有十五分钟，我却意外被监考官拦在门外。\n"同学，你这张准考证是伪造的。"\n"难道你是替考？"\n话音落下，我瞬间被吓出一身汗。',
                                style:{
                                    width:'100%',minHeight:'220px',background:'rgba(0,0,0,0.3)',
                                    border:'1px solid rgba(255,255,255,0.1)',borderRadius:'10px',
                                    color:'#e4e5e7',fontSize:'13px',padding:'12px',resize:'vertical',
                                    outline:'none',lineHeight:1.6,
                                },
                                onFocus:e=>e.target.style.borderColor='rgba(76,110,245,0.4)',
                                onBlur:e=>e.target.style.borderColor='rgba(255,255,255,0.1)',
                            }),
                            // Word count badge
                            React.createElement('div',{style:{position:'absolute',top:'10px',right:'12px',fontSize:'11px',color:'#20c997',fontWeight:600,background:'rgba(0,0,0,0.5)',padding:'2px 8px',borderRadius:'10px'}},
                                (desc.length||0)+' 字'
                            ),
                        ),
                        // Bottom model selector
                        React.createElement('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',paddingTop:'12px',borderTop:'1px solid rgba(255,255,255,0.06)'}},
                            React.createElement('div',{style:{display:'flex',alignItems:'center',gap:'6px'}},
                                React.createElement('span',{style:{fontSize:'11px',color:'#5c5f66'}},'模型'),
                                React.createElement('select',{
                                    className:'node-select',value:model,
                                    onChange:e=>setModel(e.target.value),
                                    style:{width:'auto',minWidth:'160px',fontSize:'11px',padding:'5px 10px',background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:'6px',color:'#c1c2c5',outline:'none'}
                                },
                                    React.createElement('option',{value:'gpt-5.5'},'gpt-5.5'),
                                    React.createElement('option',{value:'Qwen3-Max'},'Qwen3-Max'),
                                    React.createElement('option',{value:'gemini-3.5-flash'},'gemini-3.5-flash'),
                                ),
                            ),
                            React.createElement('button',{
                                style:{padding:'7px 18px',borderRadius:'8px',border:'none',background:'linear-gradient(135deg,#4c6ef5,#7950f2)',color:'white',fontSize:'12px',fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:'5px'},
                                onClick:(e)=>{e.stopPropagation();showToast('开始解析剧本...','info');},
                            },'⚡ 开始解析'),
                        ),
                    ) : React.createElement('div',null,
                        // Section: 基础设定
                        React.createElement('div',{style:{marginBottom:'12px'}},
                            React.createElement('div',{style:{fontSize:'11px',fontWeight:600,color:'#e4e5e7',marginBottom:'6px'}},'【基础设定】'),
                            React.createElement('textarea',{
                                value:desc,
                                onChange:e=>setDesc(e.target.value),
                                placeholder:'输入角色/场景/道具的详细描述...',
                                style:{
                                    width:'100%',minHeight:'60px',background:'rgba(255,255,255,0.03)',
                                    border:'1px solid rgba(255,255,255,0.08)',borderRadius:'8px',
                                    color:'#c1c2c5',fontSize:'12px',padding:'8px 10px',resize:'vertical',
                                    outline:'none',lineHeight:1.5,
                                },
                                onFocus:e=>e.target.style.borderColor='rgba(76,110,245,0.4)',
                                onBlur:e=>e.target.style.borderColor='rgba(255,255,255,0.08)',
                            }),
                        ),

                        // Section: 参考图/资产缩略图
                        React.createElement('div',{style:{marginBottom:'14px'}},
                            React.createElement('div',{style:{fontSize:'11px',fontWeight:600,color:'#e4e5e7',marginBottom:'8px'}},'参考素材'),
                            React.createElement('div',{style:{display:'flex',gap:'8px',flexWrap:'wrap'}},
                                React.createElement('div',{
                                    style:{width:'52px',height:'52px',borderRadius:'8px',border:'1px dashed rgba(255,255,255,0.15)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',background:'rgba(255,255,255,0.02)',transition:'all 0.15s'},
                                    onMouseEnter:e=>e.currentTarget.style.borderColor='rgba(76,110,245,0.5)',
                                    onMouseLeave:e=>e.currentTarget.style.borderColor='rgba(255,255,255,0.15)',
                                }, React.createElement('span',{style:{fontSize:'20px',color:'#5c5f66'}},'+')),
                                ...demoThumbs.map((src,i)=>React.createElement('div',{key:i,
